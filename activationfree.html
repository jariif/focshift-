<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activation — Focshift Free</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00e5ff;
      --blue: #1565c0;
      --dark: #080b10;
      --card: #111620;
      --border: #1e2a3a;
      --text: #e0e8f0;
      --muted: #7a8fa6;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 900px;
      background: rgba(13, 17, 23, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 28px; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--cyan); }

    .page {
      padding: 120px 24px 80px;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .heading {
      text-align: center;
    }

    .heading h1 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      color: var(--text);
      line-height: 1.3;
    }

    .subheading {
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .subheading span {
      color: var(--cyan);
      font-weight: 500;
    }

    .input-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 1px;
    }

    .input-wrap input::placeholder {
      color: var(--muted);
      letter-spacing: 0;
    }

    .input-wrap input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }

    .code-display {
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--cyan);
      letter-spacing: 2px;
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 12px;
      padding: 14px 20px;
    }

    .btn-cyan {
      display: block;
      width: 100%;
      text-align: center;
      padding: 15px;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--cyan), #4fc3f7);
      color: #080b10;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(0,229,255,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-cyan:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(0,229,255,0.45);
    }

    .error-msg {
      text-align: center;
      color: #ff4f4f;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Focshift</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="plans.html">Plans</a>
    </div>
  </nav>

  <div class="page">

    <div class="heading">
      <h1>Before you start, activate your product</h1>
    </div>

    <p class="subheading">
      The activation code is given below — but in <span>Pro</span> or <span>Premium</span>, you have to buy it through Whop.
    </p>

    <div class="input-wrap">
      <input type="text" id="codeInput" placeholder="Enter Activation Code" />
    </div>

    <div class="code-display">FCSHFT-398A-6AW7-01ZX</div>

    <p class="error-msg" id="errorMsg">❌ Invalid activation code. Please try again.</p>

    <button class="btn-cyan" onclick="activate()">Activate</button>

  </div>

  <script>
    function activate() {
      const input = document.getElementById('codeInput').value.trim().toUpperCase();
      const error = document.getElementById('errorMsg');

      if (input === 'FCSHFT-398A-6AW7-01ZX') {
        localStorage.setItem('focshift_activated', 'free');
        window.location.href = 'productfree.html';
      } else {
        error.style.display = 'block';
      }
    }
  </script>

</body>
</html>
