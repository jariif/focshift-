<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Focshift</title>

<style>
  * {
      margin: 0;
          padding: 0;
              box-sizing: border-box;
                  font-family: sans-serif;
                    }

                      body {
                          background: #000;
                              color: #fff;
                                }

                                  /* NAVBAR */
                                    nav {
                                        display: flex;
                                            justify-content: space-between;
                                                align-items: center;
                                                    padding: 14px 16px;
                                                        border-bottom: 1px solid #111;
                                                          }

                                                            .logo {
                                                                color: #00D4FF;
                                                                    font-weight: bold;
                                                                        text-decoration: none;
                                                                          }

                                                                            .nav a {
                                                                                color: #aaa;
                                                                                    text-decoration: none;
                                                                                        margin-left: 10px;
                                                                                            font-size: 14px;
                                                                                              }

                                                                                                .nav a.signup {
                                                                                                    color: #000;
                                                                                                        background: #00D4FF;
                                                                                                            padding: 6px 10px;
                                                                                                                border-radius: 10px;
                                                                                                                  }

                                                                                                                    /* MAIN */
                                                                                                                      .container {
                                                                                                                          padding: 30px 16px;
                                                                                                                              max-width: 400px;
                                                                                                                                  margin: auto;
                                                                                                                                    }

                                                                                                                                      h1 {
                                                                                                                                          color: #00D4FF;
                                                                                                                                              text-align: center;
                                                                                                                                                  margin-bottom: 6px;
                                                                                                                                                    }

                                                                                                                                                      p {
                                                                                                                                                          color: #777;
                                                                                                                                                              text-align: center;
                                                                                                                                                                  font-size: 14px;
                                                                                                                                                                      margin-bottom: 20px;
                                                                                                                                                                        }

                                                                                                                                                                          input {
                                                                                                                                                                              width: 100%;
                                                                                                                                                                                  padding: 14px;
                                                                                                                                                                                      margin-bottom: 12px;
                                                                                                                                                                                          background: #111;
                                                                                                                                                                                              border: 1px solid #222;
                                                                                                                                                                                                  color: #fff;
                                                                                                                                                                                                      border-radius: 10px;
                                                                                                                                                                                                          outline: none;
                                                                                                                                                                                                            }

                                                                                                                                                                                                              input::placeholder {
                                                                                                                                                                                                                  color: #555;
                                                                                                                                                                                                                    }

                                                                                                                                                                                                                      .info {
                                                                                                                                                                                                                          margin-top: 10px;
                                                                                                                                                                                                                              margin-bottom: 18px;
                                                                                                                                                                                                                                  padding: 12px;
                                                                                                                                                                                                                                      border: 1px solid #1a1a1a;
                                                                                                                                                                                                                                          background: #0b0b0b;
                                                                                                                                                                                                                                              font-size: 12px;
                                                                                                                                                                                                                                                  color: #777;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                      .info b {
                                                                                                                                                                                                                                                          color: #00D4FF;
                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                              button {
                                                                                                                                                                                                                                                                  width: 100%;
                                                                                                                                                                                                                                                                      padding: 14px;
                                                                                                                                                                                                                                                                          border: none;
                                                                                                                                                                                                                                                                              background: #00D4FF;
                                                                                                                                                                                                                                                                                  color: #000;
                                                                                                                                                                                                                                                                                      font-weight: bold;
                                                                                                                                                                                                                                                                                          border-radius: 10px;
                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                                                                                            </head>

                                                                                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                                                                                            <nav>
                                                                                                                                                                                                                                                                                              <a class="logo" href="index.html">Focshift</a>
                                                                                                                                                                                                                                                                                                <div class="nav">
                                                                                                                                                                                                                                                                                                    <a href="index.html">Home</a>
                                                                                                                                                                                                                                                                                                        <a class="signup" href="signup.html">Sign Up</a>
                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                          </nav>

                                                                                                                                                                                                                                                                                                          <div class="container">

                                                                                                                                                                                                                                                                                                            <h1>Sign Up</h1>
                                                                                                                                                                                                                                                                                                              <p>Start your focus by creating an account</p>

                                                                                                                                                                                                                                                                                                                <input id="name" placeholder="Name">
                                                                                                                                                                                                                                                                                                                  <input id="password" type="password" placeholder="Password">

                                                                                                                                                                                                                                                                                                                    <div class="info">
                                                                                                                                                                                                                                                                                                                        <b>Note:</b><br>
                                                                                                                                                                                                                                                                                                                            1. This device + browser only.<br>
                                                                                                                                                                                                                                                                                                                                2. Pro/Premium users will need activation code later.
                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                    <button onclick="goNext()">Continue</button>

                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                                                                                                                                    function goNext() {
                                                                                                                                                                                                                                                                                                                                      let name = document.getElementById("name").value;
                                                                                                                                                                                                                                                                                                                                        let pass = document.getElementById("password").value;

                                                                                                                                                                                                                                                                                                                                          if (!name || !pass) {
                                                                                                                                                                                                                                                                                                                                              alert("Fill all fields");
                                                                                                                                                                                                                                                                                                                                                  return;
                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                      localStorage.setItem("focshift_user", JSON.stringify({
                                                                                                                                                                                                                                                                                                                                                          name: name,
                                                                                                                                                                                                                                                                                                                                                              password: pass
                                                                                                                                                                                                                                                                                                                                                                }));

                                                                                                                                                                                                                                                                                                                                                                  window.location.href = "activation.html";
                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                  </script>

                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                  </html>
